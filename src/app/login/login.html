<div class="login-page">
  <!-- Floating Orbs for premium glassmorphism background -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <!-- Main Login Card -->
  <div class="login-card">
    
    <div class="login-icon">
      <!-- Simple SVG icon -->
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="url(#icon-grad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <defs>
          <linearGradient id="icon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#4facfe" />
            <stop offset="100%" stop-color="#f5576c" />
          </linearGradient>
        </defs>
        <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
      </svg>
    </div>

    <h2 class="login-title">Welcome <span class="gradient-text">Back</span></h2>
    <p class="login-subtitle">Sign in to access your Sensex Dashboard</p>

    <!-- Error Banner -->
    <div *ngIf="errorMsg" class="error-banner" style="margin-bottom: 20px;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="12" y1="8" x2="12" y2="12"></line>
        <line x1="12" y1="16" x2="12.01" y2="16"></line>
      </svg>
      {{ errorMsg }}
    </div>

    <form class="login-form" [formGroup]="loginForm" (ngSubmit)="onSubmit()">

      <div class="field-group">
        <label class="field-label">Email Address</label>
        <div class="input-wrap">
          <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
            <polyline points="22,6 12,13 2,6"></polyline>
          </svg>
          <input
            class="field-input"
            type="email"
            placeholder="name@example.com"
            formControlName="email">
        </div>
      </div>

      <div class="field-group">
        <label class="field-label">Password</label>
        <div class="input-wrap">
          <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
          <input
            class="field-input"
            type="password"
            placeholder="••••••••"
            formControlName="password">
        </div>
      </div>

      <button type="submit" class="btn-login" [disabled]="loading || loginForm.invalid">
        <ng-container *ngIf="!loading">
          Sign In
        </ng-container>
        <ng-container *ngIf="loading">
          <div class="spinner-wrap">
            <svg class="spinner" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="2" x2="12" y2="6"></line>
              <line x1="12" y1="18" x2="12" y2="22"></line>
              <line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line>
              <line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line>
              <line x1="2" y1="12" x2="6" y2="12"></line>
              <line x1="18" y1="12" x2="22" y2="12"></line>
              <line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line>
              <line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line>
            </svg>
            Signing In...
          </div>
        </ng-container>
      </button>

    </form>

    <div class="bottom-link" style="text-align: center; margin-top: 24px; font-size: 0.85rem; color: rgba(255,255,255,0.6);">
      Don't have an account?
      <a routerLink="/register" style="color: #4facfe; text-decoration: none; font-weight: 600;">Create Account</a>
    </div>

  </div>
</div>
