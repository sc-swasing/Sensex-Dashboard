<h1>Sensex Dashboard</h1>

<table border="1">

  <tr>

    <th>Date</th>
    <th>Open</th>
    <th>High</th>
    <th>Low</th>
    <th>Close</th>

  </tr>

  @for(item of sensexData(); track item.Date){

  <tr>

    <td>{{item.Date}}</td>
    <td>{{item.Open}}</td>
    <td>{{item.High}}</td>
    <td>{{item.Low}}</td>
    <td>{{item.Close}}</td>

  </tr>

  }

</table>
